<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#2457d6">
  <meta name="description" content="Podcast Facile V3 : vrais bruitages et musiques libres.">
  <title>Podcast Facile V3</title>
  <link rel="stylesheet" href="./assets/index-PEI1vKfS.css?v=20260716-v3-3">
  <style>
    #v3-loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;color:#17325c;font:700 16px system-ui,-apple-system,sans-serif;background:#f7f9fc}
    #v3-error{display:none;max-width:680px;margin:10vh auto;padding:24px;border:1px solid #e7b8b8;border-radius:16px;background:#fff;color:#7a1f1f;font-family:system-ui,-apple-system,sans-serif}
    #v3-error code{display:block;margin-top:12px;padding:12px;border-radius:10px;background:#fff4f4;overflow-wrap:anywhere;font-size:12px}
  </style>
</head>
<body>
  <div id="root"><div id="v3-loading">Chargement de Podcast Facile V3.3…</div></div>
  <div id="v3-error">
    <strong>Podcast Facile V3.3 n’a pas pu démarrer.</strong>
    <p>Transmets le détail technique affiché ci-dessous.</p>
    <code id="v3-error-detail"></code>
  </div>

  <script>
    const showError = (error) => {
      console.error('Échec du démarrage de Podcast Facile V3.3', error);
      document.getElementById('root').innerHTML = '';
      document.getElementById('v3-error-detail').textContent = error instanceof Error ? `${error.name}: ${error.message}` : String(error);
      document.getElementById('v3-error').style.display = 'block';
    };

    const loadScript = (url) => new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = url;
      script.onload = resolve;
      script.onerror = () => reject(new Error(`Impossible de charger ${url}`));
      document.head.appendChild(script);
    });

    const ensurePako = async () => {
      if (window.pako) return;
      try {
        await loadScript('https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js');
      } catch {
        await loadScript('https://unpkg.com/pako@2.1.0/dist/pako.min.js');
      }
      if (!window.pako) throw new Error('La bibliothèque de décompression pako est indisponible.');
    };

    const fetchBundle = async () => {
      const urls = [
        'https://raw.githubusercontent.com/SbTchR/podcast-facile/main/site/assets/index-DqgYMH7Z.js.gz?v=20260716-v3-3',
        './assets/index-DqgYMH7Z.js.gz?v=20260716-v3-3'
      ];
      let lastError;
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const bytes = new Uint8Array(await response.arrayBuffer());
          if (bytes.length < 1000) throw new Error(`fichier trop court (${bytes.length} octets)`);
          return bytes;
        } catch (error) {
          lastError = error;
        }
      }
      throw new Error(`Bundle inaccessible : ${lastError instanceof Error ? lastError.message : String(lastError)}`);
    };

    (async () => {
      try {
        const bytes = await fetchBundle();
        const isGzip = bytes[0] === 0x1f && bytes[1] === 0x8b;
        let code;
        if (isGzip) {
          await ensurePako();
          const decoded = window.pako.ungzip(bytes);
          code = new TextDecoder('utf-8').decode(decoded);
        } else {
          code = new TextDecoder('utf-8').decode(bytes);
        }
        if (!code.includes('createRoot') || code.length < 250000) {
          throw new Error(`Bundle incomplet ou invalide (${code.length} caractères).`);
        }
        const runApplication = new Function(`${code}\n//# sourceURL=podcast-facile-v3-3.js`);
        runApplication();
      } catch (error) {
        showError(error);
      }
    })();
  </script>
</body>
</html>
