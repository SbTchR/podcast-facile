<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2457d6" />
  <meta name="description" content="Podcast Facile V3 : crée un podcast avec de vrais bruitages et musiques libres." />
  <title>Podcast Facile V3</title>
  <link rel="stylesheet" href="./assets/index-PEI1vKfS.css?v=20260716-v3-2" />
  <style>
    #v3-loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;color:#17325c;font:700 16px system-ui,-apple-system,sans-serif;background:#f7f9fc}
    #v3-error{display:none;max-width:680px;margin:12vh auto;padding:24px;border:1px solid #e7b8b8;border-radius:16px;background:#fff;color:#7a1f1f;font-family:system-ui,-apple-system,sans-serif}
    #v3-error code{display:block;margin-top:12px;padding:12px;border-radius:10px;background:#fff4f4;overflow-wrap:anywhere;font-size:12px}
  </style>
</head>
<body>
  <div id="root"><div id="v3-loading">Chargement de Podcast Facile V3…</div></div>
  <div id="v3-error">
    <strong>Podcast Facile V3 n’a pas pu démarrer.</strong>
    <p>Recharge la page. Si le problème persiste, transmets le détail ci-dessous.</p>
    <code id="v3-error-detail"></code>
  </div>
  <script type="module">
    const VERSION = '20260716-v3-2';

    const decodeBundle = async (response) => {
      const bytes = new Uint8Array(await response.arrayBuffer());
      const isGzip = bytes.length >= 2 && bytes[0] === 0x1f && bytes[1] === 0x8b;

      if (!isGzip) {
        return new TextDecoder('utf-8').decode(bytes);
      }

      if (!('DecompressionStream' in window)) {
        throw new Error('Ce navigateur ne sait pas décompresser le bundle gzip.');
      }

      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    };

    try {
      const response = await fetch(`./assets/index-DqgYMH7Z.js.gz?v=${VERSION}`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Bundle V3 introuvable (HTTP ${response.status}).`);
      }

      const code = await decodeBundle(response);
      if (!code.includes('createRoot') || code.length < 250000) {
        throw new Error(`Le bundle V3 téléchargé est incomplet (${code.length} caractères).`);
      }

      const runApplication = new Function(`${code}\n//# sourceURL=podcast-facile-v3.js`);
      runApplication();
    } catch (error) {
      console.error('Échec du démarrage de Podcast Facile V3', error);
      document.getElementById('root').innerHTML = '';
      document.getElementById('v3-error-detail').textContent = error instanceof Error ? `${error.name}: ${error.message}` : String(error);
      document.getElementById('v3-error').style.display = 'block';
    }
  </script>
</body>
</html>
