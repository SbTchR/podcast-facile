<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2457d6" />
  <meta name="description" content="Podcast Facile : crée un podcast en assemblant simplement ta voix, des musiques et des bruitages." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2718%27 fill=%27%232457d6%27/%3E%3Ctext x=%2732%27 y=%2741%27 text-anchor=%27middle%27 font-family=%27Arial%27 font-size=%2724%27 font-weight=%27700%27 fill=%27white%27%3EPF%3C/text%3E%3C/svg%3E" />
  <title>Podcast Facile</title>
  <style>html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;background:#f7f9fc}#loading{min-height:100vh;display:grid;place-items:center;color:#17325c;font-weight:700}#error{display:none;max-width:680px;margin:15vh auto;padding:24px;border:1px solid #e7b8b8;border-radius:16px;background:#fff;color:#7a1f1f}</style>
</head>
<body>
  <div id="root"><div id="loading">Chargement de Podcast Facile…</div></div>
  <div id="error"><strong>Podcast Facile ne peut pas démarrer.</strong><p>Utilise une version récente de Chrome, Edge, Firefox ou Safari, puis recharge la page.</p></div>
  <script type="module">
    const parts = ["js-00.txt", "js-01.txt", "js-02.txt", "js-03.txt", "js-04.txt", "js-05.txt", "js-06.txt"];
    const decode = async (text) => {
      if (!('DecompressionStream' in window)) throw new Error('DecompressionStream indisponible');
      const bytes = Uint8Array.from(atob(text), c => c.charCodeAt(0));
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    };
    try {
      const [cssText, jsParts] = await Promise.all([
        fetch('./payload/css.txt').then(r => { if(!r.ok) throw new Error('CSS introuvable'); return r.text(); }).then(decode),
        Promise.all(parts.map(name => fetch('./payload/' + name).then(r => { if(!r.ok) throw new Error(name + ' introuvable'); return r.text(); })))
      ]);
      const style = document.createElement('style');
      style.textContent = cssText;
      document.head.appendChild(style);
      const code = await decode(jsParts.join(''));
      const url = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
      await import(url);
      URL.revokeObjectURL(url);
    } catch (error) {
      console.error(error);
      document.getElementById('root').innerHTML = '';
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
