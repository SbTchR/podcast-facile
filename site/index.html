<!doctype html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#2457d6"><meta name="description" content="Podcast Facile : crée un podcast en assemblant simplement ta voix, des musiques et des bruitages."><title>Podcast Facile</title><style>html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;background:#f7f9fc}#loading{min-height:100vh;display:grid;place-items:center;color:#17325c;font-weight:700}#error{display:none;max-width:680px;margin:15vh auto;padding:24px;border:1px solid #e7b8b8;border-radius:16px;background:#fff;color:#7a1f1f}</style></head>
<body><div id="root"><div id="loading">Chargement de Podcast Facile V2…</div></div><div id="error"><strong>Podcast Facile ne peut pas démarrer.</strong><p>Utilise une version récente de Chrome, Edge, Firefox ou Safari, puis recharge la page.</p></div>
<script type="module">
const cssParts=["css-00.txt", "css-01.txt"];
const jsParts=["js-00-00.txt", "js-00-01.txt", "js-00-02.txt", "js-00-03.txt", "js-00-04.txt", "js-01-00.txt", "js-01-01.txt", "js-01-02.txt", "js-01-03.txt", "js-01-04.txt", "js-02-00.txt", "js-02-01.txt", "js-02-02.txt", "js-02-03.txt", "js-02-04.txt", "js-03-00.txt", "js-03-01.txt", "js-03-02.txt", "js-03-03.txt", "js-03-04.txt"];
const decode=async text=>{if(!('DecompressionStream'in window))throw new Error('DecompressionStream indisponible');const bytes=Uint8Array.from(atob(text),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));return new Response(stream).text()};
try{const get=async n=>{const r=await fetch('./v2/'+n);if(!r.ok)throw new Error(n+' introuvable');return r.text()};const [cssChunks,jsChunks]=await Promise.all([Promise.all(cssParts.map(get)),Promise.all(jsParts.map(get))]);const style=document.createElement('style');style.textContent=await decode(cssChunks.join(''));document.head.appendChild(style);const code=await decode(jsChunks.join(''));const url=URL.createObjectURL(new Blob([code],{type:'text/javascript'}));await import(url);URL.revokeObjectURL(url)}catch(error){console.error(error);document.getElementById('root').innerHTML='';document.getElementById('error').style.display='block'}
</script></body></html>
