<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#2457d6">
  <meta name="description" content="Podcast Facile : crée un podcast en assemblant simplement ta voix, des musiques et des bruitages.">
  <title>Podcast Facile</title>
  <style>
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f9fc}
    #loading{min-height:100vh;display:grid;place-items:center;color:#17325c;font-weight:700;padding:24px;text-align:center}
    #error{display:none;max-width:680px;margin:12vh auto;padding:24px;border:1px solid #e7b8b8;border-radius:16px;background:#fff;color:#7a1f1f;box-shadow:0 12px 40px rgba(40,20,20,.08)}
    #error code{display:block;margin-top:12px;padding:12px;border-radius:10px;background:#fff4f4;color:#5f1717;overflow-wrap:anywhere;font-size:12px}
    #error button{margin-top:14px;padding:10px 16px;border:0;border-radius:10px;background:#2457d6;color:#fff;font:inherit;font-weight:700}
  </style>
</head>
<body>
  <div id="root"><div id="loading">Chargement de Podcast Facile V2…</div></div>
  <div id="error">
    <strong>Podcast Facile n’a pas pu démarrer.</strong>
    <p id="error-help">Recharge la page. Si le problème persiste, transmets le détail technique affiché ci-dessous.</p>
    <code id="error-detail"></code>
    <button type="button" onclick="location.reload()">Recharger</button>
  </div>
  <script type="module">
    const VERSION = '2026-07-15-safari-2';
    const cssParts = ['css-00.txt','css-01.txt'];
    const jsParts = [
      'js-00-00.txt','js-00-01.txt','js-00-02.txt','js-00-03.txt','js-00-04.txt',
      'js-01-00.txt','fix/js-01-01-1.txt','fix/js-01-01-2.txt','fix/js-01-01-3.txt','js-01-02.txt','js-01-03.txt','js-01-04.txt',
      'js-02-00.txt','js-02-01.txt','js-02-02.txt','fix/js-02-03-1.txt','fix/js-02-03-2.txt','fix/js-02-03-3.txt','js-02-04.txt',
      'js-03-00.txt','js-03-01.txt','js-03-02.txt','js-03-03.txt','js-03-04.txt'
    ];

    const decode = async (text) => {
      if (!('DecompressionStream' in window)) {
        throw new Error('API DecompressionStream absente (Safari/iOS antérieur à 16.4).');
      }
      const clean = text.replace(/\s+/g, '');
      const bytes = Uint8Array.from(atob(clean), character => character.charCodeAt(0));
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    };

    const getPart = async (name) => {
      const response = await fetch(`./v2/${name}?v=${VERSION}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`${name} introuvable (HTTP ${response.status}).`);
      return await response.text();
    };

    const showError = (error) => {
      console.error('Échec du démarrage de Podcast Facile', error);
      document.getElementById('root').innerHTML = '';
      document.getElementById('error-detail').textContent = error instanceof Error ? `${error.name}: ${error.message}` : String(error);
      document.getElementById('error').style.display = 'block';
    };

    try {
      const [cssChunks, jsChunks] = await Promise.all([
        Promise.all(cssParts.map(getPart)),
        Promise.all(jsParts.map(getPart))
      ]);

      const css = await decode(cssChunks.join(''));
      const style = document.createElement('style');
      style.textContent = css;
      document.head.appendChild(style);

      const code = await decode(jsChunks.join(''));
      const runApplication = new Function(`${code}\n//# sourceURL=podcast-facile-v2.js`);
      runApplication();
    } catch (error) {
      showError(error);
    }
  </script>
</body>
</html>
