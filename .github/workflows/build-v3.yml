name: Build and publish Podcast Facile V3 standard

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'app-parts/**'
      - '.github/workflows/build-v3.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-v3-standard
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package.json

      - name: Reconstruire les sources complètes
        run: bash app/scripts/reconstruct-podcast-source.sh

      - name: Vérifier les sources corrigées
        run: bash app/scripts/verify-audio-source.sh

      - name: Installer les dépendances
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Vérifier TypeScript
        working-directory: app
        run: npm run check

      - name: Compiler l’application
        working-directory: app
        run: npm run build

      - name: Vérifier le résultat compilé
        run: bash app/scripts/verify-audio-build.sh

      - name: Installer le site statique
        run: |
          rm -rf site
          mkdir site
          cp -R app/dist/. site/
          touch site/.nojekyll
          cat > index.html <<'HTML'
          <!doctype html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="refresh" content="0;url=./site/?v=20260722-editor-expansion-1">
            <title>Podcast Facile V3</title>
            <script>location.replace('./site/?v=20260722-editor-expansion-1')</script>
          </head>
          <body><a href="./site/?v=20260722-editor-expansion-1">Ouvrir Podcast Facile V3</a></body>
          </html>
          HTML

      - name: Publier le site généré
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A site index.html app/package-lock.json
          if git diff --cached --quiet; then
            echo "Aucun changement généré à publier."
          else
            git commit -m "Publier les corrections audio"
            git push origin HEAD:main
          fi
